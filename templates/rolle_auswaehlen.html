{% extends "base.html" %}

{% block TITLE %}Rolle auswählen{% endblock %}

{% block CONTENT %}
    <div class="container text-center mt-5">

    <h1>Willkommen bei HelpYourNeighbour</h1>

    <p class="lead">
        Wie möchten Sie die Plattform nutzen?
    </p>

<form action="{{ url_for('register') }}" method="get">
            <input type="hidden" name="rolle" value="hilfe_suchend">

            <button type="submit" class="btn btn-primary btn-lg m-2">
                Hilfe suchen
            </button>
        </form>

        <form action="{{ url_for('register') }}" method="get">
            <input type="hidden" name="rolle" value="hilfe_anbietend">

            <button type="submit" class="btn btn-success btn-lg m-2">
                Hilfe anbieten
            </button>
        </form>

    </div>

</div>

{% endblock %}
