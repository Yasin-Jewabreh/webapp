{% extends 'base.html'%}

{% block TITLE %}Chat{% endblock %}

{% block CONTENT %}

<h2>Chat</h2>

<div class="chat-verlauf">
 {% for nachricht in nachrichten %}
    {% if nachricht.sender_id == 1 %}
    <div class="card mb-2 ms-auto" style="max-width: 60%; background-color: #d4b8e0;">
    {% else %}
    <div class="card mb-2" style="max-width: 60%;">
    {% endif %}
        <div class="card-body">
            <p class="card-text">{{ nachricht.inhalt }}</p>
            <small class="text-muted">{{ nachricht.zeitstempel.strftime('%d.%m.%Y %H:%M') }}</small>
        </div>
    </div>
{% endfor %}  
</div>
<form action="" method="post" class="mt-3">
    <div class="mb-3">
        <textarea name="inhalt" class="form-control" rows="3" placeholder="Nachricht eingeben..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Senden</button>
</form>

{% endblock %}
