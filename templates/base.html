<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block TITLE %}{% endblock %} - HelpyourNeighbour</title>
{{bootstrap.load_css()}}
</head>
<body>
      <nav class="navbar navbar-expand-xl border-bottom mb-3">
        <div class="container">
        <a class="navbar-brand" href="#">HelpYourNeighbour</a>
    </div> 
</nav>

<main class="container">
<div class="container mt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show col-md-6 mx-auto flash-message py-2" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close py-2.5" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>
     {% block CONTENT %}{% endblock %}
      </main>
    {{bootstrap.load_js()}}
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Suche alle Flash-Meldungen auf der Seite
        const alertElements = document.querySelectorAll('.flash-message');
        
        alertElements.forEach(function(alertEl) {
            // 2. Warte 5000 Millisekunden (5 Sekunden)
            setTimeout(function() {
                // 3. Nutze das eingebaute Bootstrap-Objekt, um die Meldung elegant zu schließen
                if (typeof bootstrap !== 'undefined' && bootstrap.Alert) {
                    const bsAlert = new bootstrap.Alert(alertEl);
                    bsAlert.close();
                } else {
                    // Fallback: Falls Bootstrap noch nicht geladen war, einfach so ausblenden
                    alertEl.classList.remove('show');
                    setTimeout(() => alertEl.remove(), 500);
                }
            }, 3000);
        });
    });
</script>
</body>
</html>
