{% extends "base.html" %}

{% block TITLE %}
Login
{% endblock %}

{% block CONTENT %}

<a href="{{ url_for('startseite') }}" class="btn btn-outline-secondary mb-3">
    ← Zurück
</a>
<h2>Login</h2>

{% if fehler %}
<div class="alert alert-danger">
    {{ fehler }}

    {% if "Benutzer nicht vorhanden" in fehler %}
        <br><br>
        <a href="{{ url_for('rolle_auswaehlen') }}" class="btn btn-primary">
            Zur Registrierung
        </a>
    {% endif %}
</div>
{% endif %}

<form method="POST">
    <label>E-Mail</label>
    <input type="email" name="email">

    <label>Passwort</label>
    <input type="password" name="passwort">

    <button type="submit">Login</button>
</form>
{% endblock %}
