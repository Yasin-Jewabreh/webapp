{% extends "base.html" %}

{% block TITLE %}
Login
{% endblock %}

{% block CONTENT %}
<h2>Login</h2>
{% if fehler %}
<div class="alert alert-danger">
    {{ fehler }}

    {% if "Benutzer nicht vorhanden" in fehler %}
        <br>
        <a href="{{ url_for('register') }}">
            Jetzt registrieren
        </a>
    {% endif %}
</div>
{% endif %}

<form method="POST">
    <label>E-Mail</label>
    <input type="email" name="email">

    <label>Passwort</label>
    <input type="password" name="passwort">

    <button type="submit">Login</button>
</form>
{% endblock %}
